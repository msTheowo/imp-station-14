# Cardboard

- type: entity
  id: Cardwall
  parent: [ BaseWall, BaseDeltaPressureCardboard ] # imp edit, ensure it's more wall-like and take damage from delta pressure
  name: cardboard wall
  description: It's a marvel of engineering that this is able to hold against the vacuum of space. #imp edit
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/pierce.ogg"
  - type: Tag
    tags:
    - Wall
  - type: Sprite
    #drawdepth: SmallObjects #so bullets pass 'through' # imp edit, make this more wall-like. ideally bullets would be able to both damage the wall and pass through them, but I don't think that's possible
    sprite: _QB/Structures/Walls/card.rsi
  - type: Icon
    sprite: _QB/Structures/Walls/card.rsi
    state: full
  - type: Construction
    graph: Cardwall
    node: cardwall
    deconstructionTarget: start
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Card
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer #imp edit, FlimsyLayer -> WallLayer,
        density: 100 #imp edit, it's cardboard, a lot lighter than steel
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 80 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCardboard:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior # imp edit
        sound:
          collection: WoodDestroy
  - type: IconSmooth
    key: cards
    base: card
  - type: Occluder
  - type: BlockWeather
  - type: SunShadowCast
  # imp edit start
  - type: RadiationBlocker
    resistance: .5 #down from 2 from BaseWall. not great, but better a lot better than you'd imagine
  - type: StaticPrice
    price: 7.5 # price of the sheets of cardboard required
  # imp edit end
