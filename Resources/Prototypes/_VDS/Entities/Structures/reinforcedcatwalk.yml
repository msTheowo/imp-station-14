# TODO move this to tiles once tile smoothing is supported
- type: entity
  id: ReinforcedCatwalk
  name: reinforced catwalk
  description: A sturdier catwalk designed for environmental hazards.
  placement:
    mode: SnapgridCenter
  components:
  - type: Anchorable
    flags:
    - Anchorable
  - type: Rotatable
  - type: Clickable
  - type: Sprite
    sprite: _VDS/Structures/reinforcedcatwalk.rsi
    drawdepth: FloorTiles
  - type: Icon
    sprite: _VDS/Structures/reinforcedcatwalk.rsi
    state: reinforcedcatwalk_preview
  - type: Transform
    anchored: true
  - type: Physics # VDS
    bodyType: Static
  - type: Fixtures # VDS, so catwalks can affect acoustics
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 5
        hard: false
        layer:
        - DoorPassable
  - type: IconSmooth
    key: reinforcedcatwalk
    base: reinforcedcatwalk_
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepCatwalk
      params:
        volume: 8
  - type: Tag
    tags:
      - Catwalk
  - type: Construction
    graph: Catwalk
    node: ReinforcedCatwalk
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal: # takes two to construct, so drop less than that
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: TrayScanReveal
  - type: RCDDeconstructable
    cost: 2
    delay: 2
    fx: EffectRCDDeconstruct2
  - type: AcousticData # VDS
    absorption: -8 # when I think catwalk I imagine reverb.