- type: constructionGraph
  id: Catwalk
  start: start
  graph:
    - node: start
      edges:
        - to: Catwalk
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: MetalRod
              amount: 2

    - node: Catwalk
      entity: Catwalk
      edges:
        - to: start
          completed:
          - !type:SpawnPrototype
                prototype: PartRodMetal1
                amount: 2
          - !type:DeleteEntity {}
          steps:
            - tool: Cutting

        - to: ReinforcedCatwalk
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: Steel
              amount: 1
              doAfter: 1

    - node: ReinforcedCatwalk # VDS
      entity: ReinforcedCatwalk
      edges:
        - to: Catwalk
          completed:
          - !type:SpawnPrototype
                prototype: SheetSteel1
                amount: 1
          steps:
            - tool: Cutting
              doAfter: 2
